# extra settings to be merged into OpenTelemetry Collector configuration
# do not delete this file

## Example configuration for sending data to your own OTLP HTTP backend
## Note: the spanmetrics exporter must be included in the exporters array
## if overriding the traces pipeline.
##
#  exporters:
#    otlp_http/example:
#      endpoint: <your-endpoint-url>
#
#  service:
#    pipelines:
#      traces:
#        exporters: [spanmetrics, otlp_http/example]

exporters:
  debug:
  otlp/lgtm:
    endpoint: "lgtm:4317"
    tls:
      insecure: true
    sending_queue:
      batch:

processors:
  resource/k8s_attributes:
    attributes:
      - key: k8s.cluster.name
        value: fake-demo-cluster
        action: upsert
      - key: k8s.namespace.name
        value: otel-demo
        action: upsert

service:
  pipelines:
    traces:
      exporters: [otlp/lgtm]
      processors: [resourcedetection, memory_limiter, transform/sanitize_spans, resource/k8s_attributes]
    logs:
      processors: [resourcedetection, memory_limiter, resource/k8s_attributes]
      exporters: [otlp/lgtm]
    metrics:
      receivers: [docker_stats, httpcheck/frontend-proxy, hostmetrics, nginx, otlp, postgresql, redis, kafkametrics]
      processors: [resourcedetection, memory_limiter, resource/k8s_attributes]
      exporters: [otlp/lgtm]
